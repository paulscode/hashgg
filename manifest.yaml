id: hashgg
title: "HashGG"
version: 0.5.0.0
release-notes: "Add Umbrel community-app-store support. Fix VPS tunnel when DATUM_STRATUM_PORT is overridden (previously hardcoded 23335). UI: favicon + clipboard fallback that selects source text when browser blocks clipboard API."
license: MIT
wrapper-repo: "https://github.com/paulscode/hashgg"
upstream-repo: "https://github.com/playit-cloud/playit-agent"
support-site: "https://github.com/paulscode/hashgg/issues"
marketing-site: "https://github.com/paulscode/hashgg"
build: ["make"]
description:
  short: "Expose Datum Gateway to the internet — playit.gg or VPS tunnel"
  long: |
    HashGG connects your Datum Gateway stratum port to the public internet
    with no port forwarding or static IP required. Choose between two tunnel
    options: playit.gg (~$3/month, fiat) or a VPS SSH tunnel (~$11/month,
    Bitcoin-funded via BitLaunch for privacy). Both options monitor and
    auto-restart the tunnel. Miners anywhere can connect using the public
    endpoint displayed in the dashboard.
assets:
  license: LICENSE
  icon: icon.png
  instructions: INSTRUCTIONS.md
main:
  type: docker
  image: main
  entrypoint: "docker_entrypoint.sh"
  args: []
  mounts:
    main: /root
  gpu-acceleration: false
hardware-requirements:
  arch:
    - x86_64
    - aarch64
health-checks:
  tunnel:
    name: "Tunnel Status"
    success-message: "Tunnel is connected. Miners can connect to the public endpoint."
    type: docker
    image: main
    system: false
    entrypoint: check-tunnel.sh
    args: []
    mounts:
      main: /root
    io-format: json
    inject: true
  datum:
    name: "Datum Gateway Reachable"
    success-message: "Datum Gateway stratum port is accessible."
    type: docker
    image: main
    system: false
    entrypoint: check-datum.sh
    args: []
    mounts: {}
    io-format: json
    inject: true
config:
  get:
    type: script
  set:
    type: script
properties:
  type: script
volumes:
  main:
    type: data
interfaces:
  main:
    name: "HashGG Dashboard"
    description: "Web UI for managing the HashGG tunnel (playit.gg or VPS SSH)"
    tor-config:
      port-mapping:
        80: "3000"
    lan-config:
      443:
        ssl: true
        internal: 3000
    ui: true
    protocols:
      - tcp
      - http
dependencies:
  datum:
    version: ">=0.4.0"
    requirement:
      type: "required"
    description: "Datum Gateway provides the stratum server that HashGG exposes to the internet."
    config: ~
backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - create
      - /mnt/backup
      - /root
    mounts:
      BACKUP: "/mnt/backup"
      main: "/root/data"
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - restore
      - /mnt/backup
      - /root
    mounts:
      BACKUP: "/mnt/backup"
      main: "/root/data"
migrations:
  from:
    "*":
      type: script
      args: ["from"]
  to:
    "*":
      type: script
      args: ["to"]
