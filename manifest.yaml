id: hashgg
title: "HashGG"
version: 0.2.0.0
release-notes: "Add StartOS 0.4.0 support; parameterize Datum Gateway hostname for dual-version compatibility"
license: MIT
wrapper-repo: "https://github.com/paulscode/hashgg"
upstream-repo: "https://github.com/playit-cloud/playit-agent"
support-site: "https://github.com/paulscode/hashgg/issues"
marketing-site: "https://github.com/paulscode/hashgg"
build: ["make"]
description:
  short: "Expose Datum Gateway to the internet via playit.gg"
  long: |
    HashGG connects your Datum Gateway stratum port to the public internet
    through playit.gg tunneling. No port forwarding or static IP required.
    Miners anywhere can connect to your gateway using the public endpoint
    displayed in the dashboard.
assets:
  license: LICENSE
  icon: icon.png
  instructions: INSTRUCTIONS.md
main:
  type: docker
  image: main
  entrypoint: "docker_entrypoint.sh"
  args: []
  mounts:
    main: /root
  gpu-acceleration: false
hardware-requirements:
  arch:
    - x86_64
    - aarch64
health-checks:
  tunnel:
    name: "Playit Tunnel"
    success-message: "Tunnel is connected. Miners can connect to the public endpoint."
    type: docker
    image: main
    system: false
    entrypoint: check-tunnel.sh
    args: []
    mounts:
      main: /root
    io-format: json
    inject: true
  datum:
    name: "Datum Gateway Reachable"
    success-message: "Datum Gateway stratum port is accessible."
    type: docker
    image: main
    system: false
    entrypoint: check-datum.sh
    args: []
    mounts: {}
    io-format: json
    inject: true
config:
  get:
    type: script
  set:
    type: script
properties:
  type: script
volumes:
  main:
    type: data
interfaces:
  main:
    name: "HashGG Dashboard"
    description: "Web UI for managing the playit.gg tunnel"
    tor-config:
      port-mapping:
        80: "3000"
    lan-config:
      443:
        ssl: true
        internal: 3000
    ui: true
    protocols:
      - tcp
      - http
dependencies:
  datum:
    version: ">=0.4.0"
    requirement:
      type: "required"
    description: "Datum Gateway provides the stratum server that HashGG exposes to the internet."
    config: ~
backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - create
      - /mnt/backup
      - /root
    mounts:
      BACKUP: "/mnt/backup"
      main: "/root/data"
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - restore
      - /mnt/backup
      - /root
    mounts:
      BACKUP: "/mnt/backup"
      main: "/root/data"
migrations:
  from:
    "*":
      type: script
      args: ["from"]
  to:
    "*":
      type: script
      args: ["to"]
